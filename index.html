<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0"
        />
        <title>GS1 Barcode Parser</title>
        <link rel="stylesheet" href="./style.css" />
    </head>

    <body>
        <div class="container">
            <div class="card">
                <h1>GS1 Barcode Parser</h1>
                <p class="subtitle">Scan Data Matrix barcodes with GS1 application identifiers</p>
                
                <button id="start-scanning" class="btn btn-primary">
                    Start Scanning
                </button>
                
                <div id="result" class="result-container"></div>
            </div>
        </div>

        <script type="module">
            import "./ScanbotSDK.ui2.min.js";
            const sdk = await ScanbotSDK.initialize({
                enginePath: "./",
            });
            document
            .getElementById("start-scanning")
            .addEventListener("click", async () => {
                const config =
                    new ScanbotSDK.UI.Config.BarcodeScannerScreenConfiguration();
                config.scannerConfiguration.barcodeFormats = ["DATA_MATRIX"]
                config.viewFinder.aspectRatio.height = 1;
                config.viewFinder.aspectRatio.width = 1;

                const scanResult = await ScanbotSDK.UI.createBarcodeScanner(config);

                if (scanResult?.items?.length > 0) {
                    if (scanResult.items[0].barcode.isGS1Message) {
                        const data = scanResult.items[0].barcode.extractedDocument;
                        if (!data?.children?.length) {
                            document.getElementById("result").innerHTML = "";
                            return;
                        }

                        const results = data.children
                            .map((child) => {
                                const fields = child.fields;
                                if (!fields?.length) return undefined;

                                const dataSet = { label: "", value: "" };

                                for (const field of fields) {
                                    const typeName = field.type?.name;
                                    const text = field.value?.text || "";

                                    if (typeName === "ElementDescription") {
                                        dataSet.label = text;
                                    } else if (typeName === "RawValue") {
                                        dataSet.value = text;
                                    }
                                }

                                return dataSet;
                            })
                            .filter((field) => field !== undefined);

                        if (!results.length) {
                            document.getElementById("result").innerHTML = "";
                            return;
                        }

                        const resultHTML = results
                            .map((item) => `<div class="result-item"><span class="label">${item.label}:</span> <span class="value">${item.value}</span></div>`)
                            .join("");
                        
                        document.getElementById("result").innerHTML = resultHTML;
                    } else {
                        document.getElementById("result").innerHTML = '<div class="error">No application identifiers found</div>';
                    }
                } else {
                    document.getElementById("result").innerHTML = '<div class="info">Scanning aborted by the user</div>';
                }
            });
    </script>
    </body>
</html>
