<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0"
  />
  <title>GS1 Barcode Parser</title>

  <style>
    :root{
      --bg:#0f1724;
      --card:#0b1220;
      --accent:#06b6d4;
      --muted:#9aa6b2;
      --text:#e6eef3;
      --glass: rgba(255,255,255,0.03);
      --radius:12px;
      --shadow: 0 6px 18px rgba(2,6,23,0.6);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial;
    }

    html,body{
      height:100%;
      margin:0;
      background: linear-gradient(180deg,#071024 0%, #07172a 60%);
      color:var(--text);
      -webkit-font-smoothing:antialiased;
      -moz-osx-font-smoothing:grayscale;
    }

    .wrap{
      min-height:100%;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:24px;
      box-sizing:border-box;
    }

    .card{
      width:100%;
      max-width:880px;
      background: linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01));
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      padding:20px;
      display:grid;
      gap:18px;
      align-items:start;
    }

    @media (max-width:850px){
      .card{ grid-template-columns: 1fr; }
    }

    .main{
      padding:14px;
      background: linear-gradient(180deg, rgba(255,255,255,0.015), rgba(255,255,255,0.01));
      border-radius:10px;
      min-height:220px;
    }

    .side{
      padding:14px;
      background:linear-gradient(180deg, rgba(255,255,255,0.01), rgba(255,255,255,0.005));
      border-radius:10px;
      display:flex;
      flex-direction:column;
      gap:12px;
      min-width:220px;
    }

    h1{
      margin:0 0 6px 0;
      font-size:20px;
      font-weight:600;
      color:var(--text);
    }

    p.lead{
      margin:0 0 12px 0;
      color:var(--muted);
      font-size:13px;
    }

    .controls{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      align-items:center;
    }

    button.primary{
      background:linear-gradient(90deg, var(--accent), #0ea5a4);
      border: none;
      color: #042027;
      padding:10px 16px;
      border-radius:10px;
      font-weight:600;
      cursor:pointer;
      box-shadow: 0 6px 14px rgba(6,182,212,0.12);
      transition:transform .12s ease, box-shadow .12s ease, opacity .12s ease;
    }

    button.primary:active{ transform:translateY(1px) scale(.998); }
    button.primary[disabled]{ opacity:.6; cursor:not-allowed; transform:none; box-shadow:none; }

    button.ghost{
      background:transparent;
      border:1px solid rgba(255,255,255,0.06);
      color:var(--text);
      padding:10px 12px;
      border-radius:10px;
      cursor:pointer;
    }

    .result{
    margin-top:12px;
    background:var(--glass);
    border-radius:8px;
    padding:12px;
    color:var(--text);
    font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, "Roboto Mono", monospace;
    font-size:13px;
    min-height:120px;
    overflow:auto;
    white-space:normal;       /* allow wrapping */
    border:1px solid rgba(255,255,255,0.02);
    display:flex;
    flex-direction:column;
    gap:8px;
    }

    /* individual item card inside result */
    .result-item{
    background: linear-gradient(180deg, rgba(255,255,255,0.01), rgba(255,255,255,0.005));
    border-radius:8px;
    padding:10px;
    display:flex;
    justify-content:space-between;
    gap:12px;
    align-items:center;
    border:1px solid rgba(255,255,255,0.03);
    }

    /* key and value styling */
    .result-item .key{ color:var(--muted); font-weight:600; font-size:12px; }
    .result-item .val{ color:var(--text); font-family:inherit; font-size:13px; word-break:break-all; text-align:right; }


    .status{
      font-size:13px;
      color:var(--muted);
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card" role="application" aria-label="GS1 Barcode Parser">
      <div class="main">
        <h1>GS1 Barcode Parser</h1>
        <div class="controls" aria-hidden="false">
          <button id="start-scanning" class="primary" type="button">Start scanning</button>
          <button id="clear" class="ghost" type="button">Clear</button>
        </div>

        <div id="result" class="result" aria-live="polite"></div>
      </div>

    </div>
  </div>

  <script type="module">
    import "./ScanbotSDK.ui2.min.js";

    const startBtn = document.getElementById("start-scanning");
    const clearBtn = document.getElementById("clear");
    const resultEl = document.getElementById("result");
    const statusEl = document.getElementById("status");

    let sdk;
    async function initSDK(){
      try{
        statusEl.textContent = "Initializing SDK…";
        sdk = await ScanbotSDK.initialize({ enginePath: "./" });
        statusEl.textContent = "Ready";
      }catch(e){
        console.error(e);
        statusEl.textContent = "SDK init failed";
      }
    }
    initSDK();

    async function renderResults(items){
        if(!items || items.length === 0){
            resultEl.textContent = "Scanning aborted by the user";
            return;
        }

        const item = items[0];
        if(!item?.barcode?.isGS1Message){
            resultEl.textContent = "No application identifiers found";
            return;
        }

        const data = item.barcode.extractedDocument;
        if(!data?.children?.length){
            resultEl.textContent = "";
            return;
        }

        const results = data.children
        .map(child => {
            const fields = child.fields;
            if(!fields?.length) return undefined;
            const dataSet = { label: "", value: "" };
            for(const field of fields){
                const typeName = field.type?.name;
                const text = field.value?.text || "";
                if(typeName === "ElementDescription") dataSet.label = text;
                else if(typeName === "RawValue") dataSet.value = text;
            }
            return dataSet;
        })
        .filter(Boolean);

        if(!results.length){
        resultEl.textContent = "";
        return;
        }

        // render as separate item blocks
        resultEl.innerHTML = "";
        results.forEach(i => {
            const node = document.createElement("div");
            node.className = "result-item";
            const key = document.createElement("div");
            key.className = "key";
            key.textContent = i.label;

            const val = document.createElement("div");
            val.className = "val";
            val.textContent = i.value;

            node.appendChild(key);
            node.appendChild(val);
            resultEl.appendChild(node);
            });
        }

    startBtn.addEventListener("click", async () => {
      if(!sdk){
        statusEl.textContent = "SDK not ready";
        return;
      }
      try{
        startBtn.disabled = true;
        statusEl.textContent = "Opening scanner…";
        const config = new ScanbotSDK.UI.Config.BarcodeScannerScreenConfiguration();
        config.scannerConfiguration.barcodeFormats = ["DATA_MATRIX"];
        config.viewFinder.aspectRatio.height = 1;
        config.viewFinder.aspectRatio.width = 1;

        const scanResult = await ScanbotSDK.UI.createBarcodeScanner(config);
        statusEl.textContent = "Ready";
        renderResults(scanResult?.items || []);
      }catch(err){
        console.error(err);
        statusEl.textContent = "Scan failed";
        resultEl.textContent = "Scanning aborted by the user";
      }finally{
        startBtn.disabled = false;
      }
    });

    clearBtn.addEventListener("click", () => {
      resultEl.textContent = "";
      statusEl.textContent = "Ready";
    });
  </script>
</body>
</html>
